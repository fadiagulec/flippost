<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Viral Flip — FlipIt</title>
    <meta name="description" content="Someone flipped a viral post into a scroll-stopping script with FlipIt. See the result and make your own free.">
    <meta property="og:title" content="A Viral Flip — Made with FlipIt">
    <meta property="og:description" content="See It. Flip It. Post It. Go Viral. Make your own viral flip free at flipit-app.netlify.app">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://flipit-app.netlify.app/share.html">
    <meta property="og:image" content="https://flipit-app.netlify.app/og-share.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="A Viral Flip — Made with FlipIt">
    <meta name="twitter:description" content="See It. Flip It. Post It. Go Viral. Make your own free.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .share-hero {
            text-align: center;
            padding: 24px 0 16px;
        }
        .share-hero .badge {
            display: inline-block;
            background: linear-gradient(135deg, #0d6e66, #c2185b);
            color: #fff;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }
        .share-hero h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .share-hero p {
            color: #555;
            font-size: 17px;
        }
        .share-card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.06);
            margin: 24px 0;
        }
        .share-card h3 {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .share-card .flip-text {
            font-size: 18px;
            line-height: 1.7;
            color: #1a1a2e;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .share-card .flip-hook {
            font-size: 22px;
            font-weight: 700;
            color: #0d6e66;
            line-height: 1.4;
            padding: 14px 18px;
            background: #f0faf8;
            border-left: 4px solid #0d6e66;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .platform-tag {
            display: inline-block;
            font-size: 13px;
            color: #888;
            margin-top: 12px;
        }
        .cta-section {
            text-align: center;
            padding: 36px 24px;
            background: linear-gradient(135deg, #0d6e66, #0a9b8e);
            border-radius: 16px;
            color: #fff;
            margin-top: 32px;
        }
        .cta-section h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .cta-section p {
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.95;
        }
        .cta-btn {
            display: inline-block;
            background: #fff;
            color: #0d6e66;
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 17px;
            transition: transform 0.15s ease;
        }
        .cta-btn:hover { transform: translateY(-2px); }
        .reshare {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .reshare a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: #fff;
            color: #1a1a2e;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid #e8e4de;
        }
        .reshare a:hover { border-color: #0d6e66; color: #0d6e66; }
        .error-box {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .error-box h2 { color: #1a1a2e; margin-bottom: 12px; }
        .error-box a { color: #0d6e66; font-weight: 700; }
        @media (max-width: 600px) {
            .share-hero h1 { font-size: 24px; }
            .share-card { padding: 20px; }
            .share-card .flip-hook { font-size: 18px; }
            .share-card .flip-text { font-size: 16px; }
            .cta-section h2 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">FlipIt</a>
            <p class="tagline">See It. Flip It. Post It. Go Viral.</p>
        </div>
    </header>

    <main class="container">
        <div id="shareContainer">
            <div class="error-box">
                <h2>⏳ Loading...</h2>
                <p>Decoding the flip...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 <a href="/flipit-landing-page.html">FlipIt</a> — All rights reserved.</p>
    </footer>

    <script src="share.js"></script>
</body>
</html>
